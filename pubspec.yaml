name: tautulli
description: Dart client for the Tautulli API.
version: 3.0.0
homepage: https://github.com/Tautulli/tautulli-dart
repository: https://github.com/Tautulli/tautulli-dart
issue_tracker: https://github.com/Tautulli/tautulli-dart/issues
topics:
  - tautulli
  - plex
  - api-client
  - monitoring

# API compatibility:
# Written against: https://github.com/Tautulli/Tautulli/wiki/Tautulli-API-Reference
# Minimum supported Tautulli server version: 2.10.5
# Last audited against Tautulli: v2.17.0

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  http: ^1.6.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
