name: tautulli
description: A Dart client for the Tautulli API. Provides typed access to activity, history, libraries, users, and more for Plex media server monitoring.
version: 3.0.1
homepage: https://github.com/Tautulli/tautulli-dart
repository: https://github.com/Tautulli/tautulli-dart
issue_tracker: https://github.com/Tautulli/tautulli-dart/issues
topics:
  - tautulli
  - plex
  - api-client
  - monitoring

# API compatibility:
# Written against: https://github.com/Tautulli/Tautulli/wiki/Tautulli-API-Reference
# Last audited against Tautulli: v2.17.2

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  http: ^1.6.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
